services:

  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: adoptar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: adoptar_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adoptar_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adoptar_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adoptar-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/adoptar_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: adoptar_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # Frontend React (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adoptar-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

# Volumen persistente para PostgreSQL
volumes:
  postgres_data:
